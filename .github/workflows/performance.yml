name: performance

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Run performance benchmarks
        run: bundle exec rake performance:compare
